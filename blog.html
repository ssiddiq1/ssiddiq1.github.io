<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Shayaan Siddique</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page-header {
      padding: 5rem 2.5rem 3rem;
      max-width: 900px;
      margin: 0 auto;
      border-bottom: 1px solid var(--border);
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 400;
      color: var(--white);
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    .page-header p {
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 480px;
    }

    .posts-list {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2.5rem 6rem;
    }

    /* empty state */
    .empty-state {
      padding: 6rem 0;
      text-align: center;
    }

    .empty-state p {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .empty-state .empty-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--text);
      font-weight: 400;
      margin-bottom: 1rem;
      font-family: 'Playfair Display', serif;
    }

    /* post card */
    .post-card {
      display: block;
      text-decoration: none;
      padding: 2.5rem 0;
      border-bottom: 1px solid var(--border);
      transition: all 0.2s;
    }

    .post-card:first-child { border-top: 1px solid var(--border); margin-top: 2.5rem; }

    .post-card:hover .post-title { color: var(--accent); }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 0.75rem;
    }

    .post-date {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .post-tags {
      display: flex;
      gap: 0.5rem;
    }

    .tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent2);
      padding: 0.15rem 0.5rem;
      border: 1px solid var(--accent2);
      opacity: 0.7;
    }

    .post-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 400;
      color: var(--white);
      line-height: 1.25;
      margin-bottom: 0.75rem;
      transition: color 0.2s;
    }

    .post-excerpt {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.7;
      max-width: 600px;
    }

    .post-read-more {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-top: 1rem;
    }

    @media (max-width: 640px) {
      .page-header { padding: 3rem 1.5rem 2rem; }
      .posts-list { padding: 0 1.5rem 4rem; }
    }
  </style>
</head>
<body>

<nav id="nav">
  <a href="index.html" class="nav-logo">Shayaan Siddique</a>
  <div class="nav-toggle" onclick="toggleNav()">
    <span></span><span></span><span></span>
  </div>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="blog.html" class="active">Blog</a></li>
    <li><a href="projects.html">Projects</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<main>
  <header class="page-header">
    <p class="section-label">Writing</p>
    <h1>Blog</h1>
    <p>Notes on quant finance, machine learning, mathematics, and whatever I'm thinking about.</p>
  </header>

  <section class="posts-list" id="postsList">
    <!-- populated by JS -->
  </section>
</main>

<footer>
  <span class="footer-name">Shayaan Siddique</span>
  <ul class="footer-links">
    <li><a href="blog.html">Blog</a></li>
    <li><a href="projects.html">Projects</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <span class="footer-copy">© 2025</span>
</footer>

<script src="posts.js"></script>
<script>
  window.addEventListener('scroll', () => {
    document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 10);
  });

  function toggleNav() {
    document.getElementById('navLinks').classList.toggle('open');
  }

  const list = document.getElementById('postsList');

  if (typeof POSTS === 'undefined' || POSTS.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <p>— Coming soon —</p>
        <p class="empty-title">First post in progress</p>
        <p style="color:var(--muted);font-size:0.85rem;">Check back shortly.</p>
      </div>`;
  } else {
    // Sort newest first
    const sorted = [...POSTS].sort((a, b) => new Date(b.date) - new Date(a.date));
    sorted.forEach(p => {
      const d = new Date(p.date);
      const dateStr = d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      const tags = (p.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
      list.innerHTML += `
        <a class="post-card" href="posts/${p.slug}.html">
          <div class="post-meta">
            <span class="post-date">${dateStr}</span>
            <div class="post-tags">${tags}</div>
          </div>
          <h2 class="post-title">${p.title}</h2>
          <p class="post-excerpt">${p.excerpt}</p>
          <span class="post-read-more">Read →</span>
        </a>`;
    });
  }
</script>
</body>
</html>
