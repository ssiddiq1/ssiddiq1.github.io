<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — Shayaan Siddique</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page-header {
      padding: 5rem 2.5rem 3rem;
      max-width: 900px;
      margin: 0 auto;
      border-bottom: 1px solid var(--border);
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 400;
      color: var(--white);
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    .page-header p {
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 480px;
    }

    .projects-grid {
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 2.5rem 6rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 1.5rem;
    }

    .empty-state {
      max-width: 900px;
      margin: 0 auto;
      padding: 6rem 2.5rem;
      text-align: center;
    }

    .empty-state p {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .empty-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--text);
      font-weight: 400;
      margin-bottom: 1rem;
    }

    /* project card */
    .project-card {
      border: 1px solid var(--border);
      padding: 2rem;
      transition: border-color 0.2s;
    }

    .project-card:hover { border-color: var(--accent2); }

    .project-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 400;
      color: var(--white);
      margin-bottom: 0.75rem;
    }

    .project-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    .tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent2);
      padding: 0.15rem 0.5rem;
      border: 1px solid var(--accent2);
      opacity: 0.7;
    }

    .project-desc {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.7;
      margin-bottom: 1.25rem;
    }

    .project-links {
      display: flex;
      gap: 1rem;
    }

    @media (max-width: 640px) {
      .page-header { padding: 3rem 1.5rem 2rem; }
      .projects-grid { padding: 2rem 1.5rem 4rem; grid-template-columns: 1fr; }
      .empty-state { padding: 4rem 1.5rem; }
    }
  </style>
</head>
<body>

<nav id="nav">
  <a href="index.html" class="nav-logo">Shayaan Siddique</a>
  <div class="nav-toggle" onclick="toggleNav()">
    <span></span><span></span><span></span>
  </div>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="blog.html">Blog</a></li>
    <li><a href="projects.html" class="active">Projects</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<main>
  <header class="page-header">
    <p class="section-label">Work</p>
    <h1>Projects</h1>
    <p>Selected work in quantitative finance, machine learning, and software.</p>
  </header>

  <div id="projectsContainer"></div>
</main>

<footer>
  <span class="footer-name">Shayaan Siddique</span>
  <ul class="footer-links">
    <li><a href="blog.html">Blog</a></li>
    <li><a href="projects.html">Projects</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <span class="footer-copy">© 2025</span>
</footer>

<script src="posts.js"></script>
<script>
  window.addEventListener('scroll', () => {
    document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 10);
  });

  function toggleNav() {
    document.getElementById('navLinks').classList.toggle('open');
  }

  const container = document.getElementById('projectsContainer');

  if (typeof PROJECTS === 'undefined' || PROJECTS.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <p>— Coming soon —</p>
        <p class="empty-title">Projects being added</p>
        <p style="color:var(--muted);font-size:0.85rem;">Check back shortly.</p>
      </div>`;
  } else {
    const grid = document.createElement('div');
    grid.className = 'projects-grid';
    PROJECTS.forEach(p => {
      const tags = (p.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
      let links = '';
      if (p.githubUrl) links += `<a href="${p.githubUrl}" class="btn" target="_blank" rel="noopener">GitHub</a>`;
      if (p.demoUrl)   links += `<a href="${p.demoUrl}"   class="btn" target="_blank" rel="noopener">Demo ↗</a>`;
      grid.innerHTML += `
        <div class="project-card">
          <h3 class="project-title">${p.title}</h3>
          <div class="project-tags">${tags}</div>
          <p class="project-desc">${p.description}</p>
          ${links ? `<div class="project-links">${links}</div>` : ''}
        </div>`;
    });
    container.appendChild(grid);
  }
</script>
</body>
</html>
